apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redis-app
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/arahman101/redis-k8s-lab.git
    targetRevision: main
    path: redis-app

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true